{% extends 'layout.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">회원가입</h3>
                    <form action="/join" method="post">
                        <div class="mb-3">
                            <label class="form-label">아이디</label>
                            <div class="input-group">
                                <input type="text" name="uid" class="form-control" value="{{ uid if uid else '' }}"
                                       required>
                                <button type="submit" name="action" value="check_id" class="btn btn-outline-secondary"
                                        formnovalidate>중복 확인
                                </button>
                            </div>
                            {% if msg %}
                            <small style="color: {{ 'red' if is_duplicate else 'green' }}">{{ msg }}</small>
                            {% endif %}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" name="name" class="form-control" value="{{ name if name else '' }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">비밀번호</label>
                            <div class="input-group">
                                <input type="password" name="password" id="password_input" class="form-control"
                                       value="{{ password if password else '' }}" required>

                                <button class="btn btn-outline-secondary" type="button" id="toggle_password">
                                    <i class="bi bi-eye-slash" id="eye_icon"></i>
                                </button>
                            </div>
                        </div>

                        <script>
                            document.getElementById('toggle_password').addEventListener('click', function() {
                                const passwordInput = document.getElementById('password_input');
                                const eyeIcon = document.getElementById('eye_icon');

                                if (passwordInput.type === 'password') {
                                    passwordInput.type = 'text';
                                    eyeIcon.classList.remove('bi-eye-slash');
                                    eyeIcon.classList.add('bi-eye');
                                } else {
                                    passwordInput.type = 'password';
                                    eyeIcon.classList.remove('bi-eye');
                                    eyeIcon.classList.add('bi-eye-slash');
                                }
                            });
                        </script>

                        <div class="mb-3">
                            <label class="form-label">이메일 주소</label>
                            <div class="input-group">
                                <input type="text" name="email_id" class="form-control"
                                       value="{{ email_id if email_id else '' }}" required>
                                <span class="input-group-text">@</span>

                                <select name="email_domain" id="domain_select" class="form-select"
                                        onchange="toggleDirectInput()">
                                    {% for d in domains %}
                                    <option value="{{ d }}" {% if email_domain== d %}selected{% endif %}>{{ d }}</option>{% endfor %}

                                    <option value="direct" {% if email_domain=='direct' %}selected{% endif %}>직접 입력</option>

                                </select>

                                <input type="text" name="email_domain_direct" id="domain_input" class="form-control"
                                       placeholder="도메인 입력"
                                       value="{{ email_domain_direct if email_domain_direct else '' }}"
                                       style="display: {{ 'block' if email_domain_direct else 'none' }};">
                            </div>

                            <script>
                                function toggleDirectInput() {
                                    const select = document.getElementById('domain_select');
                                    const input = document.getElementById('domain_input');

                                    if (select.value === 'direct') {
                                        input.style.display = 'block';
                                        input.required = true;
                                        input.focus();
                                    } else {
                                        input.style.display = 'none';
                                        input.required = false;
                                        input.value = ''; // 선택지로 돌아가면 입력값 초기화
                                    }
                                }
                            </script>
                        </div>

                        <button type="submit" name="action" value="join" class="btn btn-dark w-100">가입하기</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="/login" class="text-decoration-none text-muted">이미 계정이 있으신가요? 로그인</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
